services:
  db1:
    container_name: db1
    image: postgres:latest
    ports:
      - 5432:5432
    environment:
      POSTGRES_PASSWORD: 123
    networks:
      - pg_net
  db2:
    container_name: db2
    image: postgres:latest
    ports:
      - 5433:5432
    environment:
      POSTGRES_PASSWORD: 123
    networks:
      - pg_net

networks:
  pg_net:
    name: pg_net
